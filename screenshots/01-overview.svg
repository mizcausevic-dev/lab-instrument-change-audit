<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
    <rect width="1400" height="860" fill="#070a0f"/>
    <rect x="24" y="24" width="1352" height="812" rx="30" fill="#0a1426" stroke="rgba(120,255,170,.18)"/>
    <rect x="58" y="58" width="1284" height="152" rx="26" fill="#0b1220" stroke="rgba(120,255,170,.12)"/>
    <text x="94" y="96" fill="#37ff8b" font-size="13" font-weight="700" font-family="Consolas, monospace">
<tspan x="94" dy="0">LAB INSTRUMENT CHANGE AUDIT</tspan>
</text>
    <text x="94" y="146" fill="#f5f7ff" font-size="34" font-weight="700" font-family="Georgia, serif">
<tspan x="94" dy="0">Control-plane summary for firmware</tspan>
<tspan x="94" dy="42">changes, calibration drift, and</tspan>
<tspan x="94" dy="42">audit-safe attestation posture.</tspan>
</text>
    <text x="94" y="194" fill="#b8c6db" font-size="18" font-weight="400" font-family="Inter,Segoe UI,Arial">
<tspan x="94" dy="0">Firmware review, stale calibration windows, SOP acknowledgments, and audit traces stay visible</tspan>
<tspan x="94" dy="22">together before an instrument clears reuse or release review.</tspan>
</text>
    
    
    <rect x="58" y="238" width="288" height="150" rx="20" fill="#111827" stroke="rgba(120,255,170,.14)" />
    <text x="82" y="272" fill="#8fdcff" font-size="11" font-weight="700" font-family="Consolas, monospace">
<tspan x="82" dy="0">CHANGE SNAPSHOTS</tspan>
</text>
    <text x="82" y="324" fill="#19c7ff" font-size="34" font-weight="700" font-family="Segoe UI, Arial">
<tspan x="82" dy="0">2</tspan>
</text>
    <text x="82" y="362" fill="#b8c6db" font-size="15" font-weight="400" font-family="Inter,Segoe UI,Arial">
<tspan x="82" dy="0">Synthetic instrument change</tspan>
<tspan x="82" dy="18">and audit bundles across</tspan>
<tspan x="82" dy="18">active quality lanes.</tspan>
</text>
    
    
    <rect x="364" y="238" width="288" height="150" rx="20" fill="#111827" stroke="rgba(120,255,170,.14)" />
    <text x="388" y="272" fill="#8fdcff" font-size="11" font-weight="700" font-family="Consolas, monospace">
<tspan x="388" dy="0">ACTIVE GAPS</tspan>
</text>
    <text x="388" y="324" fill="#ffcc66" font-size="34" font-weight="700" font-family="Segoe UI, Arial">
<tspan x="388" dy="0">6</tspan>
</text>
    <text x="388" y="362" fill="#b8c6db" font-size="15" font-weight="400" font-family="Inter,Segoe UI,Arial">
<tspan x="388" dy="0">Firmware, calibration,</tspan>
<tspan x="388" dy="18">training, maintenance,</tspan>
<tspan x="388" dy="18">audit, and attestation gaps</tspan>
<tspan x="388" dy="18">still open.</tspan>
</text>
    
    
    <rect x="670" y="238" width="288" height="150" rx="20" fill="#111827" stroke="rgba(120,255,170,.14)" />
    <text x="694" y="272" fill="#8fdcff" font-size="11" font-weight="700" font-family="Consolas, monospace">
<tspan x="694" dy="0">BLOCKING GAPS</tspan>
</text>
    <text x="694" y="324" fill="#ff5c7a" font-size="34" font-weight="700" font-family="Segoe UI, Arial">
<tspan x="694" dy="0">4</tspan>
</text>
    <text x="694" y="362" fill="#b8c6db" font-size="15" font-weight="400" font-family="Inter,Segoe UI,Arial">
<tspan x="694" dy="0">Release-blocking issues</tspan>
<tspan x="694" dy="18">still need closure before</tspan>
<tspan x="694" dy="18">instrument reuse.</tspan>
</text>
    
    
    <rect x="976" y="238" width="366" height="150" rx="20" fill="#111827" stroke="rgba(120,255,170,.14)" />
    <text x="1000" y="272" fill="#8fdcff" font-size="11" font-weight="700" font-family="Consolas, monospace">
<tspan x="1000" dy="0">LEAD RECOMMENDATION</tspan>
</text>
    <text x="1000" y="324" fill="#37ff8b" font-size="34" font-weight="700" font-family="Segoe UI, Arial">
<tspan x="1000" dy="0">Repair calibration and attestation gaps</tspan>
</text>
    <text x="1000" y="362" fill="#b8c6db" font-size="15" font-weight="400" font-family="Inter,Segoe UI,Arial">
<tspan x="1000" dy="0">Do not clear the affected</tspan>
<tspan x="1000" dy="18">instrument lane until</tspan>
<tspan x="1000" dy="18">freshness and signoff</tspan>
<tspan x="1000" dy="18">posture recover.</tspan>
</text>
    

    
    <rect x="58" y="420" width="614" height="356" rx="22" fill="#0b1220" stroke="rgba(120,255,170,.18)" />
    <text x="84" y="454" fill="#19c7ff" font-size="11" font-weight="700" font-family="Consolas, monospace">
<tspan x="84" dy="0">CHANGE LOG</tspan>
</text>
    <text x="84" y="504" fill="#f5f7ff" font-size="28" font-weight="700" font-family="Georgia, serif">
<tspan x="84" dy="0">The riskiest control gaps stay</tspan>
<tspan x="84" dy="35">visible first.</tspan>
</text>
    <text x="84" y="556" fill="#b8c6db" font-size="16" font-weight="400" font-family="Inter,Segoe UI,Arial">
<tspan x="84" dy="0">Firmware packet holes, stale calibration evidence,</tspan>
<tspan x="84" dy="20">missing SOP acknowledgments, and audit-trace</tspan>
<tspan x="84" dy="20">breaks stay tied to their owners so the queue is</tspan>
<tspan x="84" dy="20">readable before QA closure.</tspan>
</text>
    
    <rect x="708" y="420" width="634" height="356" rx="22" fill="#0b1220" stroke="rgba(120,255,170,.18)" />
    <text x="734" y="454" fill="#37ff8b" font-size="11" font-weight="700" font-family="Consolas, monospace">
<tspan x="734" dy="0">CONTROL POSTURE</tspan>
</text>
    <text x="734" y="506" fill="#f5f7ff" font-size="28" font-weight="700" font-family="Georgia, serif">
<tspan x="734" dy="0">What must close before</tspan>
<tspan x="734" dy="35">the next review window</tspan>
</text>
    <circle cx="744" cy="574" r="5" fill="#37ff8b" />
<text x="760" y="580" fill="#e9f3ff" font-size="16" font-weight="400" font-family="Inter,Segoe UI,Arial">
<tspan x="760" dy="0">Firmware rollback and final approver proof are both still missing on</tspan>
<tspan x="760" dy="20">the core packet.</tspan>
</text>
<circle cx="744" cy="628" r="5" fill="#37ff8b" />
<text x="760" y="634" fill="#e9f3ff" font-size="16" font-weight="400" font-family="Inter,Segoe UI,Arial">
<tspan x="760" dy="0">One release lane still depends on calibration evidence that is outside</tspan>
<tspan x="760" dy="20">the freshness window.</tspan>
</text>
<circle cx="744" cy="682" r="5" fill="#37ff8b" />
<text x="760" y="688" fill="#e9f3ff" font-size="16" font-weight="400" font-family="Inter,Segoe UI,Arial">
<tspan x="760" dy="0">Final attestation is not yet signoff-safe because the reviewer</tspan>
<tspan x="760" dy="20">signature and linked proof are incomplete.</tspan>
</text>
    
    </svg>